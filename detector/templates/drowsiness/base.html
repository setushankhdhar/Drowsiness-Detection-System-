<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Drowsiness Detection System{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_styles %}{% endblock %}
</head>
<body>

<nav>
    <a href="/" class="nav-logo">
        <span class="dot"></span>
        Drowsiness Detection System
    </a>
    <div class="nav-links">
        <a href="/" {% if request.resolver_match.url_name == 'index' %}class="active"{% endif %}>Home</a>
        <a href="/about/" {% if request.resolver_match.url_name == 'about' %}class="active"{% endif %}>About</a>
        <a href="/detect/" class="nav-cta {% if request.resolver_match.url_name == 'detect' %}active{% endif %}">Launch Detection</a>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <strong>Drowsiness Detection System</strong>
    <span>Real-time driver drowsiness detection</span>
    <span>Built with OpenCV &amp; Django</span>
</footer>

</body>
</html>
